<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Sharing</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@400;700&display=swap');

        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0a0a0a;
            --surface: #111111;
            --border: #222222;
            --accent: #e8ff00;
            --text: #f0f0f0;
            --muted: #666666;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Syne', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        nav {
            padding: 20px 32px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 16px;
        }

            nav a {
                font-family: 'JetBrains Mono', monospace;
                font-size: 12px;
                color: var(--muted);
                text-decoration: none;
            }

                nav a:hover {
                    color: var(--text);
                }

        .nav-title {
            font-weight: 700;
            font-size: 15px;
        }

        main {
            flex: 1;
            padding: 48px 32px;
            max-width: 700px;
            margin: 0 auto;
            width: 100%;
        }

        .drop-zone {
            border: 1px dashed var(--border);
            padding: 48px;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.15s, background 0.15s;
            margin-bottom: 48px;
            border-radius: 2px;
        }

            .drop-zone:hover, .drop-zone.drag {
                border-color: var(--accent);
                background: #0f0f00;
            }

        .drop-icon {
            font-size: 32px;
            margin-bottom: 16px;
            opacity: 0.4;
        }

        .drop-label {
            font-size: 15px;
            color: var(--muted);
            margin-bottom: 8px;
        }

        .drop-sub {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: var(--muted);
        }

            .drop-sub span {
                color: var(--accent);
                cursor: pointer;
            }

        #file-input {
            display: none;
        }

        .section-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: var(--muted);
            letter-spacing: 0.12em;
            text-transform: uppercase;
            margin-bottom: 16px;
        }

        #file-list {
            display: flex;
            flex-direction: column;
            gap: 1px;
            background: var(--border);
        }

        .file-item {
            background: var(--bg);
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            transition: background 0.15s;
        }

            .file-item:hover {
                background: var(--surface);
            }

        .file-name {
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .file-size {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: var(--muted);
        }

        .file-download {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: var(--accent);
            text-decoration: none;
            padding: 4px 10px;
            border: 1px solid var(--accent);
            border-radius: 2px;
            transition: background 0.15s, color 0.15s;
        }

            .file-download:hover {
                background: var(--accent);
                color: #000;
            }

        .empty {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: var(--muted);
            padding: 24px 0;
        }

        #upload-status {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: var(--accent);
            margin-top: 12px;
            min-height: 18px;
        }
    </style>
</head>
<body>

    <nav>
        <a href="/">? Home</a>
        <span class="nav-title">File Sharing</span>
    </nav>

    <main>
        <div class="drop-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
            <div class="drop-icon">?</div>
            <div class="drop-label">Drop a file here</div>
            <div class="drop-sub">or <span>browse</span> to upload</div>
        </div>
        <input type="file" id="file-input" onchange="upload(this.files[0])">
        <div id="upload-status"></div>

        <p class="section-label" style="margin-top: 40px;">Uploaded files</p>
        <div id="file-list">
            <div class="empty" id="empty">No files uploaded yet.</div>
        </div>
    </main>

    <script>
  const dropZone    = document.getElementById('drop-zone');
  const statusEl    = document.getElementById('upload-status');
  const fileListEl  = document.getElementById('file-list');
  const emptyEl     = document.getElementById('empty');
  const uploadedFiles = [];
  const es = new EventSource('/stream');

es.onmessage = e => {
    if (e.data.startsWith('file: ')) {
        const parts = e.data.replace('file: ', '').split(':');
        const name = parts[0];
        const size = parseInt(parts[1]);
        addFileToList(name, size);
    }
};

  // Drag and drop
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag');
    if (e.dataTransfer.files[0]) upload(e.dataTransfer.files[0]);
  });

  function formatSize(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
  }

  function addFileToList(name, size) {
    emptyEl.style.display = 'none';
    const item = document.createElement('div');
    item.className = 'file-item';
    item.innerHTML = `
      <span class="file-name">${name}</span>
      <span class="file-size">${formatSize(size)}</span>
      <a class="file-download" href="/download/${encodeURIComponent(name)}">download</a>
    `;
    fileListEl.appendChild(item);
  }

  async function upload(file) {
    if (!file) return;
    statusEl.textContent = 'Uploading ' + file.name + '...';

    const res = await fetch('/upload/' + encodeURIComponent(file.name), {
      method: 'POST',
      body: file
    });

    if (res.ok) {
      statusEl.textContent = 'Uploaded: ' + file.name;
      
    } else {
      statusEl.textContent = 'Upload failed.';
    }
  }
    </script>

</body>
</html>
